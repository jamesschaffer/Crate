name: Tests

on:
  push:
    branches: [main, fix/ci-pipeline]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-tests:
    name: iOS Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Stub GoogleService-Info.plist
        run: cp GoogleService-Info.plist.example GoogleService-Info.plist

      - name: Run iOS tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Crate-iOS \
            -destination 'platform=iOS Simulator,name=iPhone 16e,OS=latest' \
            -only-testing:CrateTests-iOS \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/ios-test.log | tail -50

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 7

  macos-tests:
    name: macOS Tests
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Stub GoogleService-Info.plist
        run: cp GoogleService-Info.plist.example GoogleService-Info.plist

      - name: Run macOS tests
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Crate-macOS \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/macos-test.log | tail -50

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 7

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [ios-tests, macos-tests]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.ios-tests.result }}" != "success" ] || [ "${{ needs.macos-tests.result }}" != "success" ]; then
            echo "One or more test jobs failed."
            echo "  iOS: ${{ needs.ios-tests.result }}"
            echo "  macOS: ${{ needs.macos-tests.result }}"
            exit 1
          fi
          echo "All tests passed."
